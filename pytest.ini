[pytest]
# DigitVision — pytest configuration
# ──────────────────────────────────────────────────────────────────────────────
# Test discovery
testpaths = tests

# Mark slow tests (model training) so CI can skip them in fast mode:
#   pytest -m "not slow"
markers =
    slow: marks tests that take > 30 seconds (e.g. full training runs)
    integration: marks tests that require trained model files on disk

# Verbose output shows test names as they run — valuable for CI logs
addopts =
    -v
    --tb=short
    --strict-markers

# Suppress TensorFlow's C++ startup logs during testing
# (Set via env var in conftest.py instead for broader compatibility)
