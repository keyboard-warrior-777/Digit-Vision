name: CI

# Trigger on every push and pull request to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Code Quality ────────────────────────────────────────────────────
  lint:
    name: "Lint & Format Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install code quality tools
        run: pip install ruff==0.4.9 black==24.4.2

      - name: Run Ruff linter
        run: ruff check src/ tests/ config/

      - name: Check Black formatting
        run: black --check src/ tests/ config/

  # ── Job 2: Tests ──────────────────────────────────────────────────────────
  test:
    name: "Run Tests"
    runs-on: ubuntu-latest
    needs: lint   # Only run tests if linting passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"   # Cache pip packages — speeds up subsequent runs

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            -m "not slow"  # Skip slow training tests in CI

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
